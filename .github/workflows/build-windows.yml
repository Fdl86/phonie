name: Build PHONIE DEV0.3.0.5 - GPU Telemetry & Turbo Warmup

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: phonie-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-portable-windows:
    name: Build portable Windows x64
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore application
        run: dotnet restore src/Phonie/Phonie.csproj

      - name: Restore phraseology smoke tests
        run: dotnet restore tests/Phonie.SmokeTests/Phonie.SmokeTests.csproj

      - name: Build
        run: dotnet build src/Phonie/Phonie.csproj --configuration Release --no-restore

      - name: Build phraseology smoke tests
        run: dotnet build tests/Phonie.SmokeTests/Phonie.SmokeTests.csproj --configuration Release --no-restore

      - name: Run phraseology smoke tests
        run: dotnet run --project tests/Phonie.SmokeTests/Phonie.SmokeTests.csproj --configuration Release --no-build --no-restore

      - name: Publish autonomous Windows x64
        run: >-
          dotnet publish src/Phonie/Phonie.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-restore
          --output dist/PHONIE-DEV0.3.0.5-win-x64
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -p:PublishReadyToRun=false
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Add build information
        shell: pwsh
        run: |
          $commit = "${{ github.sha }}".Substring(0, 7)
          @"
          PHONIE DEV0.3.0.5
          Commit: $commit
          Build UTC: $(Get-Date -AsUTC -Format 'yyyy-MM-dd HH:mm:ss')
          Runtime: Windows x64 autonome
          Modules: First Contact - contexte indicatif ATC ID - Whisper Base/Small CPU - Whisper Small Vulkan - Whisper Large-v3 Turbo Vulkan - préchauffage Turbo - benchmark GPU/VRAM multimarque - Vosk FR expérimental - libération mémoire comparaison - ATIS texte - classification radio LFBI - PTT clavier/HOTAS
          "@ | Set-Content -Encoding UTF8 dist/PHONIE-DEV0.3.0.5-win-x64/BUILD-INFO.txt

      - name: Create portable folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.5-win-x64/config | Out-Null
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.5-win-x64/logs | Out-Null
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.5-win-x64/logs/airport-data | Out-Null
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.5-win-x64/logs/benchmarks | Out-Null
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.5-win-x64/logs/sessions | Out-Null
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.5-win-x64/models/whisper | Out-Null
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.5-win-x64/models/vosk | Out-Null
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.5-win-x64/recordings | Out-Null
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.5-win-x64/cache | Out-Null
          @"
          MODÈLES WHISPER

          Les modèles ne sont pas inclus dans l'archive PHONIE.
          Choisir un profil dans l'application puis utiliser "Installer profil".
          Les fichiers sont enregistrés dans models\whisper et vérifiés par SHA-256.
          Le passage CPU vers Vulkan ou Vulkan vers CPU demande un redémarrage de PHONIE.
          "@ | Set-Content -Encoding UTF8 dist/PHONIE-DEV0.3.0.5-win-x64/models/whisper/LISEZ-MOI.txt
          @"
          VOSK FR EXPÉRIMENTAL

          Le modèle n'est pas inclus dans l'archive PHONIE.
          Sélectionner "Vosk FR - expérimental" puis utiliser "Installer profil".
          Le modèle est enregistré dans models\vosk et vérifié par SHA-256 avant extraction.
          "@ | Set-Content -Encoding UTF8 dist/PHONIE-DEV0.3.0.5-win-x64/models/vosk/LISEZ-MOI.txt
          Copy-Item README.md dist/PHONIE-DEV0.3.0.5-win-x64/README.md
          Copy-Item TEST-DEV0.3.0.5.md dist/PHONIE-DEV0.3.0.5-win-x64/TEST-DEV0.3.0.5.md
          Copy-Item ASR-PROFILES-DEV0.3.0.5.md dist/PHONIE-DEV0.3.0.5-win-x64/ASR-PROFILES-DEV0.3.0.5.md
          Copy-Item CALLSIGN-CONTEXT-DEV0.3.0.5.md dist/PHONIE-DEV0.3.0.5-win-x64/CALLSIGN-CONTEXT-DEV0.3.0.5.md
          Copy-Item TURBO-PROFILE-DEV0.3.0.5.md dist/PHONIE-DEV0.3.0.5-win-x64/TURBO-PROFILE-DEV0.3.0.5.md
          Copy-Item GPU-BENCHMARK-DEV0.3.0.5.md dist/PHONIE-DEV0.3.0.5-win-x64/GPU-BENCHMARK-DEV0.3.0.5.md
          Copy-Item CHANGELOG-DEV0.3.0.5.md dist/PHONIE-DEV0.3.0.5-win-x64/CHANGELOG-DEV0.3.0.5.md
          Copy-Item STATIC-VALIDATION-DEV0.3.0.5.txt dist/PHONIE-DEV0.3.0.5-win-x64/STATIC-VALIDATION-DEV0.3.0.5.txt
          Copy-Item ATC-ID-CALLSIGN-DEV0.3.0.5.md dist/PHONIE-DEV0.3.0.5-win-x64/ATC-ID-CALLSIGN-DEV0.3.0.5.md
          Copy-Item THIRD-PARTY-NOTICES.md dist/PHONIE-DEV0.3.0.5-win-x64/THIRD-PARTY-NOTICES.md

      - name: Create zip
        shell: pwsh
        run: Compress-Archive -Path dist/PHONIE-DEV0.3.0.5-win-x64/* -DestinationPath dist/PHONIE-DEV0.3.0.5-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PHONIE-DEV0.3.0.5-win-x64
          path: dist/PHONIE-DEV0.3.0.5-win-x64.zip
          if-no-files-found: error
          retention-days: 14
