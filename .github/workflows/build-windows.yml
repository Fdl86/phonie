name: Build PHONIE DEV0.4.1.3 - eAIP AD 2.18 Radio Hotfix and Controller Voices

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: phonie-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-portable-windows:
    name: Generate SIA data, test and publish Windows x64
    runs-on: windows-2022
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SIA generator dependencies
        run: python -m pip install --disable-pip-version-check -r tools/requirements-sia-radio.txt

      - name: Run offline SIA generator regression tests
        run: python tools/test_sia_radio_builder.py

      - name: Probe official eAIP AD 2.18 on validation aerodromes
        run: python tools/sia_radio_builder.py --cycle current --probe-airports LFBI,LFOU

      - name: Generate official SIA database when repository is bootstrapping
        shell: pwsh
        run: |
          $manifest = Get-Content data/radio/france/manifest.json -Raw | ConvertFrom-Json
          if ($manifest.bootstrapRequired -eq $true -or $null -eq $manifest.current) {
            Write-Host "Manifest d'amorçage détecté : génération de la base SIA active."
            python tools/sia_radio_builder.py --output data/radio/france --cycle current --slot current --min-airports 200 --min-frequencies 150
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          else {
            Write-Host "Base SIA versionnée déjà présente : aucune reconstruction lourde."
          }

      - name: Validate SIA database and absence of hardcoded production frequencies
        run: python tools/validate_sia_radio.py --root . --min-airports 200 --min-frequencies 150

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Verify required source files
        shell: pwsh
        run: |
          $required = @(
            "src/Phonie/Phonie.csproj",
            "src/Phonie.Core/Phonie.Core.csproj",
            "src/Phonie.Core/AirportContextResolver.cs",
            "src/Phonie.Core/AirportListPacketDecoder.cs",
            "src/Phonie.Core/SiaRadioCatalog.cs",
            "src/Phonie/Models/SiaRadioDataModels.cs",
            "src/Phonie/Services/NearbyAirportService.cs",
            "src/Phonie/Services/OfficialRadioCatalogService.cs",
            "src/Phonie/Services/RadioDataUpdateService.cs",
            "src/Phonie/Services/ControllerSpeechService.cs",
            "tests/Phonie.SmokeTests/Phonie.SmokeTests.csproj",
            "tests/Phonie.Core.Tests/Phonie.Core.Tests.csproj",
            "data/radio/france/manifest.json",
            "data/radio/france/current/airports-fr.json",
            "data/radio/france-update-source.json",
            "tools/sia_radio_builder.py",
            "tools/validate_sia_radio.py",
            "README.md",
            "TEST-DEV0.4.1.3.md",
            "SIA-RADIO-DATABASE-DEV0.4.1.3.md",
            "CONTROLLER-VOICES-DEV0.4.1.3.md",
            "CHANGELOG-DEV0.4.1.3.md",
            "STATIC-VALIDATION-DEV0.4.1.3.txt",
            "SOURCE-MANIFEST-DEV0.4.1.3.txt"
          )
          $missing = @($required | Where-Object { -not (Test-Path $_) })
          if ($missing.Count -gt 0) {
            throw "Fichiers source manquants : $($missing -join ', ')"
          }
          Write-Host "Précontrôle source OK - $($required.Count) éléments requis présents."
          dotnet --info

      - name: Restore projects
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet restore src/Phonie.Core/Phonie.Core.csproj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet restore tests/Phonie.SmokeTests/Phonie.SmokeTests.csproj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet restore tests/Phonie.Core.Tests/Phonie.Core.Tests.csproj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet restore src/Phonie/Phonie.csproj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build all projects with zero warnings
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet build src/Phonie.Core/Phonie.Core.csproj --configuration Release --no-restore -warnaserror
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet build tests/Phonie.SmokeTests/Phonie.SmokeTests.csproj --configuration Release --no-restore -warnaserror
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet build tests/Phonie.Core.Tests/Phonie.Core.Tests.csproj --configuration Release --no-restore -warnaserror
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet build src/Phonie/Phonie.csproj --configuration Release --no-restore -warnaserror
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run smoke tests
        run: dotnet run --project tests/Phonie.SmokeTests/Phonie.SmokeTests.csproj --configuration Release --no-build --no-restore

      - name: Run core tests
        run: dotnet run --project tests/Phonie.Core.Tests/Phonie.Core.Tests.csproj --configuration Release --no-build --no-restore

      - name: Publish autonomous Windows x64
        run: >-
          dotnet publish src/Phonie/Phonie.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-restore
          --output dist/PHONIE-DEV0.4.1.3-win-x64
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -p:PublishReadyToRun=false
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Add portable folders and documentation
        shell: pwsh
        run: |
          $root = "dist/PHONIE-DEV0.4.1.3-win-x64"
          $folders = @(
            "config",
            "logs",
            "logs/airport-data/raw",
            "logs/benchmarks",
            "logs/sessions",
            "logs/ground-operations",
            "models/whisper",
            "models/vosk",
            "recordings",
            "cache/atis",
            "cache/controller-voice",
            "data/radio/france/.staging"
          )
          foreach ($folder in $folders) {
            New-Item -ItemType Directory -Force "$root/$folder" | Out-Null
          }
          $commit = "${{ github.sha }}".Substring(0, 7)
          @"
          PHONIE DEV0.4.1.3 - eAIP AD 2.18 RADIO HOTFIX & CONTROLLER VOICES
          Commit: $commit
          Build UTC: $(Get-Date -AsUTC -Format 'yyyy-MM-dd HH:mm:ss')
          Runtime: Windows x64 autonome
          Radio France: base nationale générée depuis les publications officielles SIA, aucune fréquence d'aérodrome codée dans l'application
          Sécurité radio: dernière base SIA validée comme seul secours français, silence si donnée absente ou ambiguë
          Voix: attribution aléatoire homme/femme par station, stable pendant la session, cache séparé par voix
          Aérodromes: moteur dynamique DEV0.4.0.9 conservé
          "@ | Set-Content -Encoding UTF8 "$root/BUILD-INFO.txt"
          @"
          MODÈLES WHISPER

          Les modèles ne sont pas inclus. Utiliser le bouton d'installation du profil dans PHONIE.
          Tous les fichiers restent dans models\whisper et sont contrôlés par SHA-256.
          "@ | Set-Content -Encoding UTF8 "$root/models/whisper/LISEZ-MOI.txt"
          @"
          VOSK FR EXPÉRIMENTAL

          Le modèle n'est pas inclus. Utiliser le bouton d'installation du profil dans PHONIE.
          "@ | Set-Content -Encoding UTF8 "$root/models/vosk/LISEZ-MOI.txt"
          $docs = @(
            "README.md",
            "TEST-DEV0.4.1.3.md",
            "SIA-RADIO-DATABASE-DEV0.4.1.3.md",
            "CONTROLLER-VOICES-DEV0.4.1.3.md",
            "CHANGELOG-DEV0.4.1.3.md",
            "STATIC-VALIDATION-DEV0.4.1.3.txt",
            "SOURCE-MANIFEST-DEV0.4.1.3.txt",
            "GROUND-OPERATIONS-DEV0.4.0.9.md",
            "FACILITIES-NORMALIZATION-DEV0.4.0.9.md",
            "CALLSIGN-RULES-DEV0.4.0.9.md",
            "ASR-PROFILES-DEV0.3.0.5.md",
            "TURBO-PROFILE-DEV0.3.0.5.md",
            "GPU-BENCHMARK-DEV0.3.0.5.md",
            "ATC-ID-CALLSIGN-DEV0.3.0.5.md",
            "THIRD-PARTY-NOTICES.md"
          )
          foreach ($doc in $docs) { Copy-Item $doc "$root/$doc" }

      - name: Verify portable artifact
        shell: pwsh
        run: |
          $root = "dist/PHONIE-DEV0.4.1.3-win-x64"
          $required = @(
            "$root/PHONIE.exe",
            "$root/config",
            "$root/logs/ground-operations",
            "$root/recordings",
            "$root/cache/atis",
            "$root/cache/controller-voice",
            "$root/models/whisper",
            "$root/models/vosk",
            "$root/data/radio/france/manifest.json",
            "$root/data/radio/france/current/airports-fr.json",
            "$root/data/radio/france-update-source.json"
          )
          foreach ($item in $required) {
            if (-not (Test-Path $item)) { throw "Élément portable manquant : $item" }
          }
          $legacy = Get-Content "$root/data/radio/france-official.json" -Raw | ConvertFrom-Json
          if ($legacy.deprecated -ne $true -or $legacy.usedByPhonie -ne $false) {
            throw "Ancienne table radio non neutralisée."
          }

      - name: Upload portable artifact - single extraction
        uses: actions/upload-artifact@v4
        with:
          name: PHONIE-DEV0.4.1.3-win-x64
          path: dist/PHONIE-DEV0.4.1.3-win-x64/**
          if-no-files-found: error
          retention-days: 14
