name: Build PHONIE DEV0.4.0.9 - Airport Detection and Official Radio

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: phonie-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-portable-windows:
    name: Build, test and publish portable Windows x64
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Verify required source files
        shell: pwsh
        run: |
          $required = @(
            "src/Phonie/Phonie.csproj",
            "src/Phonie.Core/Phonie.Core.csproj",
            "src/Phonie.Core/AirportContextResolver.cs",
            "src/Phonie.Core/AirportRadioSelector.cs",
            "src/Phonie.Core/AirportListPacketDecoder.cs",
            "src/Phonie/Models/AirportContextModels.cs",
            "src/Phonie/Services/NearbyAirportService.cs",
            "src/Phonie/Services/OfficialRadioCatalogService.cs",
            "tests/Phonie.SmokeTests/Phonie.SmokeTests.csproj",
            "tests/Phonie.Core.Tests/Phonie.Core.Tests.csproj",
            "tests/Phonie.Core.Tests/Fixtures/LFBI-MSFS2020-ground.json",
            "tests/Phonie.Core.Tests/Fixtures/LFBI-MSFS2024-ground.json",
            "data/airports/LFBI.json",
            "data/radio/france-official.json",
            "README.md",
            "TEST-DEV0.4.0.9.md",
            "GROUND-OPERATIONS-DEV0.4.0.9.md",
            "FACILITIES-NORMALIZATION-DEV0.4.0.9.md",
            "CALLSIGN-RULES-DEV0.4.0.9.md",
            "CHANGELOG-DEV0.4.0.9.md",
            "STATIC-VALIDATION-DEV0.4.0.9.txt",
            "OPERATIONAL-PROFILES-DEV0.4.0.9.md",
            "AIRPORT-RADIO-CONTEXT-DEV0.4.0.9.md",
            "SOURCE-MANIFEST-DEV0.4.0.9.txt"
          )
          $missing = @($required | Where-Object { -not (Test-Path $_) })
          if ($missing.Count -gt 0) {
            Write-Host "Contenu racine du dépôt :"
            Get-ChildItem -Force | Select-Object Name, Length | Format-Table -AutoSize
            throw "Fichiers source manquants : $($missing -join ', ')"
          }
          Write-Host "Précontrôle source OK - $($required.Count) éléments requis présents."
          dotnet --info

      # Le workflow ne dépend volontairement plus de PHONIE.sln. Certains
      # environnements Git peuvent ignorer un fichier .sln globalement ; les
      # quatre projets sont donc restaurés et compilés explicitement.
      - name: Restore projects
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet restore src/Phonie.Core/Phonie.Core.csproj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet restore tests/Phonie.SmokeTests/Phonie.SmokeTests.csproj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet restore tests/Phonie.Core.Tests/Phonie.Core.Tests.csproj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet restore src/Phonie/Phonie.csproj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build all projects
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet build src/Phonie.Core/Phonie.Core.csproj --configuration Release --no-restore
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet build tests/Phonie.SmokeTests/Phonie.SmokeTests.csproj --configuration Release --no-restore
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet build tests/Phonie.Core.Tests/Phonie.Core.Tests.csproj --configuration Release --no-restore
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet build src/Phonie/Phonie.csproj --configuration Release --no-restore
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run DEV0.3 regression smoke tests
        run: dotnet run --project tests/Phonie.SmokeTests/Phonie.SmokeTests.csproj --configuration Release --no-build --no-restore

      - name: Run Ground Operations core tests
        run: dotnet run --project tests/Phonie.Core.Tests/Phonie.Core.Tests.csproj --configuration Release --no-build --no-restore

      - name: Publish autonomous Windows x64
        run: >-
          dotnet publish src/Phonie/Phonie.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-restore
          --output dist/PHONIE-DEV0.4.0.9-win-x64
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -p:PublishReadyToRun=false
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Add build information
        shell: pwsh
        run: |
          $commit = "${{ github.sha }}".Substring(0, 7)
          @"
          PHONIE DEV0.4.0.9 - AIRPORT DETECTION & OFFICIAL RADIO
          Commit: $commit
          Build UTC: $(Get-Date -AsUTC -Format 'yyyy-MM-dd HH:mm:ss')
          Runtime: Windows x64 autonome
          Noyau: décodeur AirportList MSFS 2024 tolérant l'emplacement rgData de compatibilité observé dans les logs réels
          Aérodromes: contextes géographique et radio séparés, détection dynamique et rechargement Facilities après spawn ou téléportation
          Radio: catalogue officiel prioritaire LFBI/LFOU, Tour prioritaire, A/A/ATIS/répondeur silencieux
          Sol: phraséologie générique, tout vrai HOLD_SHORT Facilities accepté, contrôle trafic piste avant décollage
          Sécurité: aucune clairance décollage hors point d'attente, avec trafic piste ou état trafic inconnu
          Base préservée: DEV0.3.0.5 - SimConnect, PTT, enregistrement, ASR CPU/Vulkan/Turbo/Vosk et télémétrie GPU
          "@ | Set-Content -Encoding UTF8 dist/PHONIE-DEV0.4.0.9-win-x64/BUILD-INFO.txt

      - name: Create portable folders and documentation
        shell: pwsh
        run: |
          $root = "dist/PHONIE-DEV0.4.0.9-win-x64"
          $folders = @(
            "config",
            "logs",
            "logs/airport-data",
            "logs/airport-data/raw",
            "logs/benchmarks",
            "logs/sessions",
            "logs/ground-operations",
            "models/whisper",
            "models/vosk",
            "recordings",
            "cache",
            "cache/atis",
            "cache/controller-voice",
            "data/radio"
          )
          foreach ($folder in $folders) {
            New-Item -ItemType Directory -Force "$root/$folder" | Out-Null
          }
          @"
          MODÈLES WHISPER

          Les modèles ne sont pas inclus dans l'archive PHONIE.
          Choisir un profil dans l'application puis utiliser "Installer profil".
          Les fichiers sont enregistrés dans models\whisper et vérifiés par SHA-256.
          Le passage CPU vers Vulkan ou Vulkan vers CPU demande un redémarrage de PHONIE.
          Turbo reste un profil qualité optionnel et n'est jamais sélectionné automatiquement.
          "@ | Set-Content -Encoding UTF8 "$root/models/whisper/LISEZ-MOI.txt"
          @"
          VOSK FR EXPÉRIMENTAL

          Le modèle n'est pas inclus dans l'archive PHONIE.
          Sélectionner "Vosk FR - expérimental" puis utiliser "Installer profil".
          Le modèle est enregistré dans models\vosk et vérifié par SHA-256 avant extraction.
          "@ | Set-Content -Encoding UTF8 "$root/models/vosk/LISEZ-MOI.txt"
          Copy-Item README.md "$root/README.md"
          Copy-Item TEST-DEV0.4.0.9.md "$root/TEST-DEV0.4.0.9.md"
          Copy-Item GROUND-OPERATIONS-DEV0.4.0.9.md "$root/GROUND-OPERATIONS-DEV0.4.0.9.md"
          Copy-Item FACILITIES-NORMALIZATION-DEV0.4.0.9.md "$root/FACILITIES-NORMALIZATION-DEV0.4.0.9.md"
          Copy-Item CALLSIGN-RULES-DEV0.4.0.9.md "$root/CALLSIGN-RULES-DEV0.4.0.9.md"
          Copy-Item CHANGELOG-DEV0.4.0.9.md "$root/CHANGELOG-DEV0.4.0.9.md"
          Copy-Item STATIC-VALIDATION-DEV0.4.0.9.txt "$root/STATIC-VALIDATION-DEV0.4.0.9.txt"
          Copy-Item OPERATIONAL-PROFILES-DEV0.4.0.9.md "$root/OPERATIONAL-PROFILES-DEV0.4.0.9.md"
          Copy-Item AIRPORT-RADIO-CONTEXT-DEV0.4.0.9.md "$root/AIRPORT-RADIO-CONTEXT-DEV0.4.0.9.md"
          Copy-Item SOURCE-MANIFEST-DEV0.4.0.9.txt "$root/SOURCE-MANIFEST-DEV0.4.0.9.txt"
          Copy-Item ASR-PROFILES-DEV0.3.0.5.md "$root/ASR-PROFILES-DEV0.3.0.5.md"
          Copy-Item TURBO-PROFILE-DEV0.3.0.5.md "$root/TURBO-PROFILE-DEV0.3.0.5.md"
          Copy-Item GPU-BENCHMARK-DEV0.3.0.5.md "$root/GPU-BENCHMARK-DEV0.3.0.5.md"
          Copy-Item ATC-ID-CALLSIGN-DEV0.3.0.5.md "$root/ATC-ID-CALLSIGN-DEV0.3.0.5.md"
          Copy-Item THIRD-PARTY-NOTICES.md "$root/THIRD-PARTY-NOTICES.md"

      - name: Verify portable storage layout
        shell: pwsh
        run: |
          $root = "dist/PHONIE-DEV0.4.0.9-win-x64"
          $required = @(
            "$root/PHONIE.exe",
            "$root/config",
            "$root/logs/ground-operations",
            "$root/recordings",
            "$root/cache/atis",
            "$root/cache/controller-voice",
            "$root/models/whisper",
            "$root/models/vosk",
            "$root/data/airports/LFBI.json",
            "$root/data/radio/france-official.json"
          )
          foreach ($item in $required) {
            if (-not (Test-Path $item)) {
              throw "Élément portable manquant : $item"
            }
          }

      # GitHub compresse lui-même le dossier en un seul artefact.
      # Aucun ZIP n'est créé dans le ZIP : une seule décompression donne directement PHONIE.exe.
      - name: Upload portable artifact - single extraction
        uses: actions/upload-artifact@v4
        with:
          name: PHONIE-DEV0.4.0.9-win-x64
          path: dist/PHONIE-DEV0.4.0.9-win-x64/**
          if-no-files-found: error
          retention-days: 14
