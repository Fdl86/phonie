name: Build PHONIE DEV0.4.0.1 - Facilities Diagnostic

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: phonie-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-portable-windows:
    name: Build and validate portable Windows x64
    runs-on: windows-2022
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        run: dotnet restore PHONIE.sln

      - name: Build solution
        run: dotnet build PHONIE.sln --configuration Release --no-restore

      - name: Run PHONIE smoke tests
        run: dotnet run --project tests/Phonie.SmokeTests/Phonie.SmokeTests.csproj --configuration Release --no-build --no-restore

      - name: Publish autonomous Windows x64
        run: >-
          dotnet publish src/Phonie/Phonie.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-restore
          --output dist/PHONIE-DEV0.4.0.1-win-x64
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -p:PublishReadyToRun=false
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Add build information
        shell: pwsh
        run: |
          $commit = "${{ github.sha }}".Substring(0, 7)
          @"
          PHONIE DEV0.4.0.1 - FACILITIES DIAGNOSTIC
          Commit: $commit
          Build UTC: $(Get-Date -AsUTC -Format 'yyyy-MM-dd HH:mm:ss')
          Runtime: Windows x64 autonome
          Objectif: capture binaire SimConnect Facilities et diagnostic TaxiPath LFBI
          Base conservée: DEV0.3.0.5 - ASR CPU/Vulkan/Turbo/Vosk - préchauffage Turbo - benchmark GPU - PTT clavier/HOTAS - radio - ATC ID
          "@ | Set-Content -Encoding UTF8 dist/PHONIE-DEV0.4.0.1-win-x64/BUILD-INFO.txt

      - name: Create portable folders and documentation
        shell: pwsh
        run: |
          $root = "dist/PHONIE-DEV0.4.0.1-win-x64"
          New-Item -ItemType Directory -Force "$root/config" | Out-Null
          New-Item -ItemType Directory -Force "$root/logs" | Out-Null
          New-Item -ItemType Directory -Force "$root/logs/airport-data" | Out-Null
          New-Item -ItemType Directory -Force "$root/logs/airport-data/raw" | Out-Null
          New-Item -ItemType Directory -Force "$root/logs/benchmarks" | Out-Null
          New-Item -ItemType Directory -Force "$root/logs/sessions" | Out-Null
          New-Item -ItemType Directory -Force "$root/models/whisper" | Out-Null
          New-Item -ItemType Directory -Force "$root/models/vosk" | Out-Null
          New-Item -ItemType Directory -Force "$root/recordings" | Out-Null
          New-Item -ItemType Directory -Force "$root/cache" | Out-Null
          @"
          MODÈLES WHISPER

          Les modèles ne sont pas inclus dans l'archive PHONIE.
          Choisir un profil dans l'application puis utiliser "Installer profil".
          Les fichiers sont enregistrés dans models\whisper et vérifiés par SHA-256.
          Le passage CPU vers Vulkan ou Vulkan vers CPU demande un redémarrage de PHONIE.
          "@ | Set-Content -Encoding UTF8 "$root/models/whisper/LISEZ-MOI.txt"
          @"
          VOSK FR EXPÉRIMENTAL

          Le modèle n'est pas inclus dans l'archive PHONIE.
          Sélectionner "Vosk FR - expérimental" puis utiliser "Installer profil".
          Le modèle est enregistré dans models\vosk et vérifié par SHA-256 avant extraction.
          "@ | Set-Content -Encoding UTF8 "$root/models/vosk/LISEZ-MOI.txt"
          Copy-Item README.md "$root/README.md"
          Copy-Item TEST-DEV0.4.0.1.md "$root/TEST-DEV0.4.0.1.md"
          Copy-Item FACILITIES-DIAGNOSTIC-DEV0.4.0.1.md "$root/FACILITIES-DIAGNOSTIC-DEV0.4.0.1.md"
          Copy-Item CALLSIGN-RULES-DEV0.4.0.1.md "$root/CALLSIGN-RULES-DEV0.4.0.1.md"
          Copy-Item CHANGELOG-DEV0.4.0.1.md "$root/CHANGELOG-DEV0.4.0.1.md"
          Copy-Item STATIC-VALIDATION-DEV0.4.0.1.txt "$root/STATIC-VALIDATION-DEV0.4.0.1.txt"
          Copy-Item ASR-PROFILES-DEV0.3.0.5.md "$root/ASR-PROFILES-DEV0.3.0.5.md"
          Copy-Item TURBO-PROFILE-DEV0.3.0.5.md "$root/TURBO-PROFILE-DEV0.3.0.5.md"
          Copy-Item GPU-BENCHMARK-DEV0.3.0.5.md "$root/GPU-BENCHMARK-DEV0.3.0.5.md"
          Copy-Item ATC-ID-CALLSIGN-DEV0.3.0.5.md "$root/ATC-ID-CALLSIGN-DEV0.3.0.5.md"
          Copy-Item THIRD-PARTY-NOTICES.md "$root/THIRD-PARTY-NOTICES.md"

      - name: Create portable zip
        shell: pwsh
        run: Compress-Archive -Path dist/PHONIE-DEV0.4.0.1-win-x64/* -DestinationPath dist/PHONIE-DEV0.4.0.1-win-x64.zip -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: PHONIE-DEV0.4.0.1-win-x64
          path: dist/PHONIE-DEV0.4.0.1-win-x64.zip
          if-no-files-found: error
          retention-days: 14
