name: Build PHONIE DEV0.4.2.0 R3 - Clean Source and Full CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: phonie-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-portable-windows:
    name: Compile, test, preflight publish, generate SIA and publish Windows x64
    runs-on: windows-2022
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Verify source tree before network generation
        shell: pwsh
        run: |
          $required = @(
            ".gitattributes",
            "src/Phonie/Phonie.csproj",
            "src/Phonie.Core/Phonie.Core.csproj",
            "src/Phonie.Core/AirportContextResolver.cs",
            "src/Phonie.Core/AirportListPacketDecoder.cs",
            "src/Phonie.Core/SiaRadioCatalog.cs",
            "src/Phonie.Core/PilotIntentParser.cs",
            "src/Phonie.Core/RadioUtteranceAnalysis.cs",
            "src/Phonie.Core/GroundOperationsEngine.cs",
            "src/Phonie.Core/WindowsPathSegment.cs",
            "src/Phonie/Models/SiaRadioDataModels.cs",
            "src/Phonie/Models/FlightSessionModels.cs",
            "src/Phonie/Models/SpeechRecognitionModels.cs",
            "src/Phonie/Services/NearbyAirportService.cs",
            "src/Phonie/Services/OfficialRadioCatalogService.cs",
            "src/Phonie/Services/RadioDataUpdateService.cs",
            "src/Phonie/Services/ControllerSpeechService.cs",
            "src/Phonie/Services/GroundOperationsCoordinator.cs",
            "src/Phonie/Services/PhraseologyService.cs",
            "src/Phonie/Services/WhisperService.cs",
            "tests/Phonie.SmokeTests/Phonie.SmokeTests.csproj",
            "tests/Phonie.Core.Tests/Phonie.Core.Tests.csproj",
            "tests/Phonie.Core.Tests/Fixtures/radio-utterances-dev0419.json",
            "data/radio/france/manifest.json",
            "data/radio/france-update-source.json",
            "tools/sia_radio_builder.py",
            "tools/validate_sia_radio.py",
            "PHONIE.sln",
            "README.md",
            "docs/CHANGELOG-DEV0.4.2.0.md",
            "docs/TEST-DEV0.4.2.0.md",
            "docs/TECHNICAL-NOTES-DEV0.4.2.0.md",
            "docs/SOURCE-MANIFEST-DEV0.4.2.0-R3.txt",
            "THIRD-PARTY-NOTICES.md"
          )
          $missing = @($required | Where-Object { -not (Test-Path $_) })
          if ($missing.Count -gt 0) {
            throw "Fichiers source manquants : $($missing -join ', ')"
          }

          [xml]$smokeProject = Get-Content "tests/Phonie.SmokeTests/Phonie.SmokeTests.csproj" -Raw
          $smokeReferences = @($smokeProject.Project.ItemGroup.ProjectReference | ForEach-Object { [string]$_.Include })
          if ($smokeReferences -notcontains '..\..\src\Phonie.Core\Phonie.Core.csproj') {
            throw "Phonie.SmokeTests doit référencer explicitement Phonie.Core."
          }
          $linkedCoreSources = @($smokeProject.Project.ItemGroup.Compile | Where-Object {
            ([string]$_.Include) -like '*src\Phonie.Core\*'
          })
          if ($linkedCoreSources.Count -gt 0) {
            throw "Phonie.SmokeTests ne doit plus recopier des fichiers Phonie.Core comme sources liées."
          }

          $forbiddenRoot = @(Get-ChildItem -File | Where-Object {
            $_.Name -match '^(?:CHANGELOG|TEST|STATIC-VALIDATION|SOURCE-MANIFEST|PATCH|RENORMALIZE|GROUND-OPERATIONS|FACILITIES|CALLSIGN|ASR-PROFILES|TURBO-PROFILE|GPU-BENCHMARK|ATC-ID|SIA-RADIO|RADIO-CONTACT|AIRPORT-|OPERATIONAL-|PERFORMANCE-|PORTABLE-|STARTUP-|VALIDATION-|WHISPER-).*'
          })
          if ($forbiddenRoot.Count -gt 0) {
            throw "Fichiers historiques ou outils temporaires encore présents à la racine : $($forbiddenRoot.Name -join ', ')"
          }
          $radioSource = Get-Content "src/Phonie/Services/RadioDataUpdateService.cs" -Raw
          if ($radioSource -notmatch 'using System\.Net\.Http;') {
            throw "Import System.Net.Http absent de RadioDataUpdateService.cs."
          }
          $groundSource = Get-Content "src/Phonie.Core/GroundOperationsEngine.cs" -Raw
          $intentSource = Get-Content "src/Phonie.Core/PilotIntentParser.cs" -Raw
          $utteranceSource = Get-Content "src/Phonie.Core/RadioUtteranceAnalysis.cs" -Raw
          $phraseologySource = Get-Content "src/Phonie/Services/PhraseologyService.cs" -Raw
          $coordinatorSource = Get-Content "src/Phonie/Services/GroundOperationsCoordinator.cs" -Raw
          $whisperSource = Get-Content "src/Phonie/Services/WhisperService.cs" -Raw
          $coreTestsSource = Get-Content "tests/Phonie.Core.Tests/Program.cs" -Raw
          $simConnectSource = Get-Content "src/Phonie/Services/SimConnectService.cs" -Raw
          $siaSource = Get-Content "src/Phonie.Core/SiaRadioCatalog.cs" -Raw
          if ($groundSource -notmatch 'ResetFlightSession' -or
              $groundSource -notmatch 'CALLED_STATION_CORRECTED_WITH_FREQUENCY' -or
              $groundSource -notmatch 'CALLED_STATION_CORRECTED_CHECK_FREQUENCY') {
            throw "Historique radio, réinitialisation ou correction pédagogique de station absente."
          }
          if ($groundSource -match 'ClearlyCallsAnotherService' -or
              $groundSource -match 'CALLED_STATION_MISMATCH') {
            throw "Ancien détecteur ouvert de station encore présent dans le moteur."
          }
          if ($utteranceSource -notmatch 'RadioUtteranceAnalyzer' -or
              $utteranceSource -notmatch 'Le fragment capté ne correspond à aucune station connue') {
            throw "Analyse canonique ou ensemble fermé de stations absent."
          }
          if ($phraseologySource -match 'StationRegex' -or
              $phraseologySource -notmatch 'OperationalAnalysis') {
            throw "PhraseologyService utilise encore une extraction libre ou ne transmet pas l'analyse canonique."
          }
          if ($intentSource -notmatch '"retour avec vous"' -or
              $intentSource -notmatch '"bonsoir"' -or
              $intentSource -notmatch 'mentionsIntersection && departureContext') {
            throw "Reprise de contact ou intentions intersection contextuelles absentes."
          }
          if ($coordinatorSource -notmatch 'BuildSpeechRecognitionContext' -or
              $coordinatorSource -notmatch '!contactEstablished' -or
              $coordinatorSource -notmatch 'Indicatif abrégé') {
            throw "Contexte ASR dynamique ou omission de la station après contact absente."
          }
          if ($whisperSource -notmatch 'WithPrompt' -or
              $whisperSource -notmatch 'WithNoContext' -or
              $whisperSource -notmatch 'WithSingleSegment' -or
              $whisperSource -notmatch 'WithNoSpeechThreshold' -or
              $whisperSource -notmatch 'Fragment du prompt dynamique rejeté') {
            throw "Prompt Whisper contextuel ou garde-fous anti-hallucination absents."
          }
          if ($coreTestsSource -notmatch 'TestDeparturePhraseDoesNotBecomeStation' -or
              $coreTestsSource -notmatch 'TestCommonPhraseologyFragmentsDoNotBecomeStation' -or
              $coreTestsSource -notmatch 'TestStationNameOptionalAfterContact' -or
              $coreTestsSource -notmatch 'TestClearlyCalledOtherAirportCorrected' -or
              $coreTestsSource -notmatch 'TestIntersectionDepartureWithoutReadyWord' -or
              $coreTestsSource -notmatch 'TestRealRadioCorpusReplay') {
            throw "Régressions radio contextuelle ou corpus réel absents."
          }
          if ($simConnectSource -notmatch 'FlightLoaded' -or $simConnectSource -notmatch 'SimStop') {
            throw "Détection des changements de session MSFS absente."
          }
          if ($siaSource -notmatch 'ServiceConfirmed' -or $siaSource -notmatch 'preferredServiceKind') {
            throw "Départage Facilities/SIA absent."
          }

          $frozenPaths = @(
            "data/radio/france/manifest.json",
            "tests/Phonie.SmokeTests/Fixtures/radio/france/manifest.json",
            "tests/Phonie.SmokeTests/Fixtures/radio/france/current/airports-fr.json",
            "data/airports/LFBI.json"
          )
          foreach ($path in $frozenPaths) {
            $attribute = git check-attr text -- $path
            if ($attribute -notmatch ': text: unset$') {
              throw "Attribut Git incorrect pour $path : $attribute. Les octets SHA-256 doivent être gelés avec -text."
            }
          }

          function Test-RadioManifestIntegrity([string]$manifestPath) {
            $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
            $baseDirectory = Split-Path $manifestPath -Parent
            foreach ($slot in @("previous", "current", "next")) {
              $descriptor = $manifest.$slot
              if ($null -eq $descriptor) { continue }
              $relativePath = [string]$descriptor.relativePath
              $datasetPath = Join-Path $baseDirectory ($relativePath -replace '/', [IO.Path]::DirectorySeparatorChar)
              if (-not (Test-Path $datasetPath)) {
                throw "Jeu de données $slot absent : $datasetPath"
              }
              $bytes = [IO.File]::ReadAllBytes($datasetPath)
              for ($index = 0; $index -lt ($bytes.Length - 1); $index++) {
                if ($bytes[$index] -eq 13 -and $bytes[$index + 1] -eq 10) {
                  throw "CRLF interdit dans le jeu de données haché : $datasetPath"
                }
              }
              $actualSha = (Get-FileHash $datasetPath -Algorithm SHA256).Hash.ToLowerInvariant()
              $expectedSha = ([string]$descriptor.sha256).ToLowerInvariant()
              if ($actualSha -ne $expectedSha) {
                throw "SHA-256 incorrect pour $datasetPath : attendu $expectedSha, obtenu $actualSha"
              }
            }
          }

          Test-RadioManifestIntegrity "tests/Phonie.SmokeTests/Fixtures/radio/france/manifest.json"
          Test-RadioManifestIntegrity "data/radio/france/manifest.json"
          Write-Host "Précontrôle source et intégrité SHA-256 OK - $($required.Count) éléments requis."
          dotnet --info

      - name: Restore complete solution
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet restore PHONIE.sln
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build complete solution with zero warnings
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet build PHONIE.sln --configuration Release --no-restore -warnaserror
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run smoke tests
        run: dotnet run --project tests/Phonie.SmokeTests/Phonie.SmokeTests.csproj --configuration Release --no-build --no-restore

      - name: Run core tests
        run: dotnet run --project tests/Phonie.Core.Tests/Phonie.Core.Tests.csproj --configuration Release --no-build --no-restore

      - name: Preflight autonomous Windows x64 publish
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $preflight = "dist-preflight/PHONIE-DEV0.4.2.0-win-x64"
          dotnet publish src/Phonie/Phonie.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            --output $preflight `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            -p:DebugType=None `
            -p:DebugSymbols=false
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "$preflight/PHONIE.exe")) {
            throw "Prépublication invalide : PHONIE.exe absent."
          }
          Write-Host "Prépublication Windows x64 OK."
          Remove-Item "dist-preflight" -Recurse -Force

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SIA generator dependencies
        run: python -m pip install --disable-pip-version-check -r tools/requirements-sia-radio.txt

      - name: Run offline SIA generator regression tests
        run: python tools/test_sia_radio_builder.py

      - name: Probe official eAIP AD 2.18 on validation aerodromes
        run: python tools/sia_radio_builder.py --cycle current --probe-airports LFBI,LFOU

      - name: Generate official SIA database when repository is bootstrapping
        shell: pwsh
        run: |
          $manifest = Get-Content data/radio/france/manifest.json -Raw | ConvertFrom-Json
          if ($manifest.bootstrapRequired -eq $true -or $null -eq $manifest.current) {
            Write-Host "Manifest d'amorçage détecté : génération de la base SIA active."
            python tools/sia_radio_builder.py --output data/radio/france --cycle current --slot current --min-airports 200 --min-frequencies 150
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          else {
            Write-Host "Base SIA versionnée déjà présente : aucune reconstruction lourde."
          }

      - name: Validate SIA database and absence of hardcoded production frequencies
        run: python tools/validate_sia_radio.py --root . --min-airports 200 --min-frequencies 150

      - name: Verify generated SIA payload
        shell: pwsh
        run: |
          $required = @(
            "data/radio/france/manifest.json",
            "data/radio/france/current/airports-fr.json"
          )
          $missing = @($required | Where-Object { -not (Test-Path $_) })
          if ($missing.Count -gt 0) {
            throw "Base SIA générée incomplète : $($missing -join ', ')"
          }
          Write-Host "Base SIA générée présente avant publication."

      - name: Publish autonomous Windows x64
        run: >-
          dotnet publish src/Phonie/Phonie.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-restore
          --output dist/PHONIE-DEV0.4.2.0-win-x64
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -p:PublishReadyToRun=false
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Add portable folders and documentation
        shell: pwsh
        run: |
          $root = "dist/PHONIE-DEV0.4.2.0-win-x64"
          $folders = @(
            "config",
            "logs",
            "logs/airport-data/raw",
            "logs/benchmarks",
            "logs/sessions",
            "logs/ground-operations",
            "models/whisper",
            "models/vosk",
            "recordings",
            "cache/atis",
            "cache/controller-voice",
            "data/radio/france/.staging"
          )
          foreach ($folder in $folders) {
            New-Item -ItemType Directory -Force "$root/$folder" | Out-Null
          }
          $commit = "${{ github.sha }}".Substring(0, 7)
          @"
          PHONIE DEV0.4.2.0 - RADIO INTENT & CONTEXTUAL ASR
          Commit: $commit
          Build UTC: $(Get-Date -AsUTC -Format 'yyyy-MM-dd HH:mm:ss')
          Runtime: Windows x64 autonome
          Radio France: base nationale générée depuis les publications officielles SIA, aucune fréquence d'aérodrome codée dans l'application
          Sécurité radio: stations fermées SIA; correction pédagogique d’une mauvaise station; aucun fragment libre ne provoque de silence
          Analyse: intention canonique partagée; prompt Whisper dynamique; corpus réel rejoué en Core Tests
          Voix: attribution aléatoire homme/femme par station, stable pendant la session, cache séparé par voix
          Aérodromes: moteur dynamique DEV0.4.0.9 conservé
          "@ | Set-Content -Encoding UTF8 "$root/BUILD-INFO.txt"
          @"
          MODÈLES WHISPER

          Les modèles ne sont pas inclus. Utiliser le bouton d'installation du profil dans PHONIE.
          Tous les fichiers restent dans models\whisper et sont contrôlés par SHA-256.
          "@ | Set-Content -Encoding UTF8 "$root/models/whisper/LISEZ-MOI.txt"
          @"
          VOSK FR EXPÉRIMENTAL

          Le modèle n'est pas inclus. Utiliser le bouton d'installation du profil dans PHONIE.
          "@ | Set-Content -Encoding UTF8 "$root/models/vosk/LISEZ-MOI.txt"
          Copy-Item "README.md" "$root/README.md"
          Copy-Item "THIRD-PARTY-NOTICES.md" "$root/THIRD-PARTY-NOTICES.md"
          New-Item -ItemType Directory -Force "$root/docs" | Out-Null
          Copy-Item "docs/*.md" "$root/docs/"
          Copy-Item "docs/*.txt" "$root/docs/"

      - name: Verify portable artifact
        shell: pwsh
        run: |
          $root = "dist/PHONIE-DEV0.4.2.0-win-x64"
          $required = @(
            "$root/PHONIE.exe",
            "$root/config",
            "$root/logs/ground-operations",
            "$root/recordings",
            "$root/cache/atis",
            "$root/cache/controller-voice",
            "$root/models/whisper",
            "$root/models/vosk",
            "$root/data/radio/france/manifest.json",
            "$root/data/radio/france/current/airports-fr.json",
            "$root/data/radio/france-update-source.json"
          )
          foreach ($item in $required) {
            if (-not (Test-Path $item)) { throw "Élément portable manquant : $item" }
          }
          $legacy = Get-Content "$root/data/radio/france-official.json" -Raw | ConvertFrom-Json
          if ($legacy.deprecated -ne $true -or $legacy.usedByPhonie -ne $false) {
            throw "Ancienne table radio non neutralisée."
          }

      - name: Upload portable artifact - single extraction
        uses: actions/upload-artifact@v4
        with:
          name: PHONIE-DEV0.4.2.0-win-x64
          path: dist/PHONIE-DEV0.4.2.0-win-x64/**
          if-no-files-found: error
          retention-days: 14
