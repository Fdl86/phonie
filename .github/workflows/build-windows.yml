name: Build PHONIE DEV0.3.0.1

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: phonie-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-portable-windows:
    name: Build portable Windows x64
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/Phonie/Phonie.csproj

      - name: Build
        run: dotnet build src/Phonie/Phonie.csproj --configuration Release --no-restore

      - name: Publish autonomous Windows x64
        run: >-
          dotnet publish src/Phonie/Phonie.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-restore
          --output dist/PHONIE-DEV0.3.0.1-win-x64
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -p:PublishReadyToRun=false
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Add build information
        shell: pwsh
        run: |
          $commit = "${{ github.sha }}".Substring(0, 7)
          @"
          PHONIE DEV0.3.0.1
          Commit: $commit
          Build UTC: $(Get-Date -AsUTC -Format 'yyyy-MM-dd HH:mm:ss')
          Runtime: Windows x64 autonome
          Modules: First Contact - Whisper Small q5_1 local - ATIS texte - classification radio LFBI - Airport Data corrigé - PTT clavier/HOTAS - logs performance
          "@ | Set-Content -Encoding UTF8 dist/PHONIE-DEV0.3.0.1-win-x64/BUILD-INFO.txt

      - name: Create portable folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.1-win-x64/config | Out-Null
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.1-win-x64/logs | Out-Null
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.1-win-x64/logs/airport-data | Out-Null
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.1-win-x64/logs/sessions | Out-Null
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.1-win-x64/models/whisper | Out-Null
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.1-win-x64/recordings | Out-Null
          New-Item -ItemType Directory -Force dist/PHONIE-DEV0.3.0.1-win-x64/cache | Out-Null
          @"
          WHISPER SMALL Q5_1

          Le modèle n'est pas inclus dans l'archive PHONIE.
          Dans l'application, utiliser le bouton "Télécharger Small q5_1".
          Le fichier est enregistré dans models\whisper et vérifié par empreinte SHA-1.
          Après ce téléchargement unique, la transcription fonctionne entièrement en local.
          "@ | Set-Content -Encoding UTF8 dist/PHONIE-DEV0.3.0.1-win-x64/models/whisper/LISEZ-MOI.txt

      - name: Create zip
        shell: pwsh
        run: Compress-Archive -Path dist/PHONIE-DEV0.3.0.1-win-x64/* -DestinationPath dist/PHONIE-DEV0.3.0.1-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PHONIE-DEV0.3.0.1-win-x64
          path: dist/PHONIE-DEV0.3.0.1-win-x64.zip
          if-no-files-found: error
          retention-days: 14
